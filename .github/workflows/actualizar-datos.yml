name: Actualizar datos de gasolineras

# Descarga los precios de carburantes del Ministerio y los publica como JSON
# estático en /data/estaciones.json. Así la app no depende de proxies CORS
# de terceros: hace un fetch same-origin al propio GitHub Pages.

on:
  schedule:
    # Dos veces al día (los precios se comunican a diario por la mañana).
    # Horas UTC: 05:30 y 13:30.
    - cron: '30 5,13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    env:
      OCM_API_KEY: ${{ secrets.OCM_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Descargar datos del Ministerio
        run: |
          curl -sSf --retry 3 --retry-delay 30 \
            'https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/' \
            -o /tmp/estaciones_raw.json

      - name: Convertir al formato interno de la app
        # Formato compacto que app.js consume tal cual: números en vez de
        # strings con comas, claves cortas de combustible y sin campos sobrantes.
        run: node scripts/procesar-estaciones.js /tmp/estaciones_raw.json data/estaciones.json

      - name: Descargar y procesar cargadores eléctricos (OpenChargeMap)
        # Requiere el secret OCM_API_KEY; si no está configurado, se omite.
        if: env.OCM_API_KEY != ''
        run: |
          curl -sSf --retry 3 --retry-delay 30 \
            "https://api.openchargemap.io/v3/poi/?output=json&countrycode=ES&maxresults=50000&compact=true&verbose=false&key=${OCM_API_KEY}" \
            -o /tmp/ocm_raw.json
          curl -sSf --retry 3 --retry-delay 30 \
            "https://api.openchargemap.io/v3/referencedata/?key=${OCM_API_KEY}" \
            -o /tmp/ocm_ref.json
          node scripts/procesar-cargadores.js /tmp/ocm_raw.json /tmp/ocm_ref.json data/cargadores.json

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "chore: actualizar datos de gasolineras y cargadores"
            git push
          fi
