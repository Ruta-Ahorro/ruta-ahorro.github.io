name: Actualizar datos de gasolineras

# Descarga los precios de carburantes del Ministerio y los publica como JSON
# estático en /data/estaciones.json. Así la app no depende de proxies CORS
# de terceros: hace un fetch same-origin al propio GitHub Pages.

on:
  schedule:
    # Dos veces al día (los precios se comunican a diario por la mañana).
    # Horas UTC: 05:30 y 13:30.
    - cron: '30 5,13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar datos del Ministerio
        run: |
          curl -sSf --retry 3 --retry-delay 30 \
            'https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/' \
            -o /tmp/estaciones_raw.json

      - name: Convertir al formato interno de la app
        # Formato compacto que app.js consume tal cual: números en vez de
        # strings con comas, claves cortas de combustible y sin campos sobrantes.
        run: |
          mkdir -p data
          jq -c '
            def num: gsub(","; ".") | tonumber? // null;
            {
              fecha: .Fecha,
              estaciones: [.ListaEESSPrecio[] | {
                id: .IDEESS,
                name: ."Rótulo",
                address: (."Dirección" + ", " + .Localidad),
                lat: (.Latitud | num),
                lon: (."Longitud (WGS84)" | num),
                tipoVenta: ."Tipo Venta",
                horario: .Horario,
                prices: ({
                  GA: (."Precio Gasoleo A" | num),
                  G95E5: (."Precio Gasolina 95 E5" | num),
                  G98E5: (."Precio Gasolina 98 E5" | num),
                  GP: (."Precio Gasoleo Premium" | num),
                  GB: (."Precio Gasoleo B" | num),
                  GLP: (."Precio Gases licuados del petróleo" | num),
                  GNC: (."Precio Gas Natural Comprimido" | num),
                  GNL: (."Precio Gas Natural Licuado" | num)
                } | with_entries(select(.value != null)))
              } | select(.lat != null and .lon != null)]
            }' /tmp/estaciones_raw.json > data/estaciones.json

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/estaciones.json
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "chore: actualizar datos de gasolineras"
            git push
          fi
